name: ilkersevim_json_isolate
description: >-
  Keep Flutter UIs responsive by moving large JSON work to compute while
  decoding small payloads without isolate overhead.
version: 0.1.2
repository: https://github.com/redjadet/ilkersevim_json_isolate
homepage: https://github.com/redjadet/ilkersevim_json_isolate
issue_tracker: https://github.com/redjadet/ilkersevim_json_isolate/issues
topics:
  - json
  - isolate
  - flutter
  - compute

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
